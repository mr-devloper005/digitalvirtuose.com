services:
  uq3jnkf9yb:
    container_name: uq3jnkf9yb_app
    image: ghcr.io/mr-devloper005/digitalvirtuose.com:latest
    env_file:
      - .env
    network_mode: bridge
    restart: always
    ports:
      - "127.0.0.1:3207:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
